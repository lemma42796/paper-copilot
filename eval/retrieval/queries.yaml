    used because they can change after reindex.
  - relevant_papers is the denominator for paper_recall@k.
  - evidence_anchors is an optional chunk-level subset using paper_id + stable
    text anchors; evidence_recall@k is averaged only over queries with anchors.
  - snippet_hints are legacy human hints kept for label review.
  - Only papers present in the current embeddings.db are used as positive
    labels. Papers in fields.db without matching PDFs are excluded.

